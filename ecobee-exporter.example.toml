# ecobee-exporter sample configuration. Copy to `ecobee-exporter.toml`
# and edit. The runtime config file is gitignored so secrets don't leak.

listen_addr = "0.0.0.0:9098"

# Optional HTTPS for /metrics and /healthz (PEM files). When set, both paths are required.
# [tls]
# cert_file = "/etc/ssl/fullchain.pem"
# key_file = "/etc/ssl/privkey.pem"

# Floored to 60s at startup. Don't go lower than the default; ecobee
# only updates upstream data every ~3 minutes anyway, so faster polling
# just burns API quota.
poll_interval = "3m"

state_file = "./ecobee-exporter.state.json"

# Set to true to skip Beehive entirely and serve canned data — useful
# for building dashboards and Prometheus configs without credentials.
demo = false

# Data source: "beehive" (cloud Auth0 API, default) or "homekit" (local
# HomeKit HAP — see README "HomeKit backend"). Same values work as
# `--provider` on the CLI or `ECOBEE_PROVIDER` in the environment.
# provider = "homeassistant"

[beehive]
# Data API base URL. The default (api.ecobee.com/1) is what the
# documented developer REST API has always used. Only override if
# ecobee changes the URL prefix.
# endpoint = "https://api.ecobee.com/1"

# Override the outgoing User-Agent. Default is `ecobee-exporter/<version>`.
# user_agent = "ecobee/4.x.x"

# extra_headers = [
#   ["x-ecobee-app-version", "4.x.x"],
# ]

# Normally not set: the refresh token lives in state_file after running
# `cargo run --bin ecobee-login`. Set this here only to transplant a
# refresh token between machines or to override what's on disk.
# refresh_token = "…"

# [homekit]
# pairing_file = "./homekit-pairings.json"

# [homeassistant]
# url = "http://homeassistant.local:8123"
# token = "…"
# climate_entities = ["climate.living_room"]
# weather_entities = ["weather.ecobee"]
