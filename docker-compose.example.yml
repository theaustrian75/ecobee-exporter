# Copy and adjust as needed.
#
# Backend: set ECOBEE_PROVIDER=beehive (default) or homeassistant.
# CLI equivalent: cargo run -- --provider homeassistant
#
# ---------------------------------------------------------------------------
# Beehive backend (cloud API — default)
# ---------------------------------------------------------------------------
# One-time Auth0 login (interactive; writes refresh token into the volume):
#   docker compose -f docker-compose.example.yml run --rm -it \
#     --entrypoint /usr/local/bin/docker-entrypoint.sh ecobee-exporter ecobee-login
#
# Open the printed URL in a browser, complete MFA, copy the full callback URL
# from the address bar, and paste it at the prompt. Then start the exporter:
#   docker compose -f docker-compose.example.yml up -d
#
# ---------------------------------------------------------------------------
# Home Assistant backend (REST API)
# ---------------------------------------------------------------------------
# HA must be reachable from the container. Create a .env file next to this
# compose file (gitignored) with your long-lived access token:
#   ECOBEE_HOMEASSISTANT__TOKEN=your_long_lived_token
#
# Adjust ECOBEE_HOMEASSISTANT__URL if HA is not on the Docker host
# (e.g. http://192.168.1.10:8123 or http://homeassistant:8123 on a shared network).
#   docker compose -f docker-compose.example.yml --profile homeassistant up -d
#
# ---------------------------------------------------------------------------
# TLS (HTTPS for /metrics and /healthz)
# ---------------------------------------------------------------------------
# Mount PEM files (e.g. Let's Encrypt fullchain.pem + privkey.pem), then:
#   docker compose -f docker-compose.example.yml --profile tls up -d
#
# Metrics: https://localhost:9098/metrics
# docker-healthcheck.sh probes /healthz; TLS from ECOBEE_TLS__* when cert/key files exist.
#
# Metrics (plain HTTP): http://localhost:9098/metrics

services:
  # Beehive (cloud). Started by default: `docker compose up -d`
  ecobee-exporter:
    image: ghcr.io/theaustrian75/ecobee-exporter:latest
    restart: unless-stopped
    ports:
      - "9098:9098"
    volumes:
      - ecobee-exporter-data:/var/lib/ecobee-exporter
    healthcheck:
      test: ["CMD", "/usr/local/bin/docker-healthcheck.sh"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3
    environment:
      - ECOBEE_PROVIDER=beehive
      - ECOBEE_STATE_FILE=/var/lib/ecobee-exporter/state.json
      # Match volume ownership on the host (PUID/PGID aliases also supported).
      - UID=1000
      - GID=1000
      # IANA timezone for container logs (tzdata is installed in the image).
      - TZ=America/New_York
      - ECOBEE_LISTEN_ADDR=0.0.0.0:9098
      - ECOBEE_POLL_INTERVAL=3m

  # Home Assistant REST API. Requires `--profile homeassistant` and a token in `.env`.
  ecobee-exporter-homeassistant:
    profiles: [homeassistant]
    image: ghcr.io/theaustrian75/ecobee-exporter:latest
    restart: unless-stopped
    ports:
      - "9098:9098"
    extra_hosts:
      # Reach Home Assistant on the Docker host (Linux). Omit if HA uses another hostname/IP.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "/usr/local/bin/docker-healthcheck.sh"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3
    environment:
      - ECOBEE_PROVIDER=homeassistant
      - ECOBEE_HOMEASSISTANT__URL=http://host.docker.internal:8123
      - ECOBEE_HOMEASSISTANT__TOKEN=${ECOBEE_HOMEASSISTANT__TOKEN:?set ECOBEE_HOMEASSISTANT__TOKEN in .env}
      # Export every climate.* entity by default. To restrict thermostats, mount a
      # config file: - ./ecobee-exporter.toml:/etc/ecobee-exporter/config.toml:ro
      # and set ECOBEE_EXPORTER_CONFIG=/etc/ecobee-exporter/config.toml with
      # [homeassistant] climate_entities = ["climate.living_room"] inside the file.
      - UID=1000
      - GID=1000
      - TZ=America/New_York
      - ECOBEE_LISTEN_ADDR=0.0.0.0:9098
      - ECOBEE_POLL_INTERVAL=3m

  # Beehive over HTTPS. Requires `--profile tls` and PEM files on the host.
  ecobee-exporter-tls:
    profiles: [tls]
    image: ghcr.io/theaustrian75/ecobee-exporter:latest
    restart: unless-stopped
    ports:
      - "9098:9098"
    volumes:
      - ecobee-exporter-data:/var/lib/ecobee-exporter
      # Adjust paths to your certificate files (read-only).
      - ./certs/fullchain.pem:/etc/ecobee-exporter/tls/fullchain.pem:ro
      - ./certs/privkey.pem:/etc/ecobee-exporter/tls/privkey.pem:ro
    environment:
      - ECOBEE_PROVIDER=beehive
      - ECOBEE_STATE_FILE=/var/lib/ecobee-exporter/state.json
      - UID=1000
      - GID=1000
      - TZ=America/New_York
      - ECOBEE_LISTEN_ADDR=0.0.0.0:9098
      - ECOBEE_POLL_INTERVAL=3m
      - ECOBEE_TLS__CERT_FILE=/etc/ecobee-exporter/tls/fullchain.pem
      - ECOBEE_TLS__KEY_FILE=/etc/ecobee-exporter/tls/privkey.pem
    healthcheck:
      test: ["CMD", "/usr/local/bin/docker-healthcheck.sh"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

volumes:
  ecobee-exporter-data:
